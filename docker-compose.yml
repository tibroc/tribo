# Local-dev stack: Caddy (reverse proxy) + Tribo (Go binary with embedded SPA).
# Radicale is wired but profile-gated off by default (Milestone 6).

services:
  caddy:
    image: caddy:2
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - tribo

  tribo:
    build: .
    environment:
      - DATABASE_PATH=/data/tribo.db
      - LISTEN_ADDR=:8080
    volumes:
      - tribo_data:/data

  radicale:
    image: tomsquest/docker-radicale
    profiles: ["with-radicale"]
    volumes:
      - radicale_data:/data

volumes:
  caddy_data:
  caddy_config:
  tribo_data:
  radicale_data:
