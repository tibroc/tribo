# Stack: Caddy (reverse proxy) + Tribo (Go binary with embedded SPA).
# Tribo runs from the prebuilt image published to GHCR by the `docker` workflow.
# Update with `docker compose pull && docker compose up -d`.
# Pin a version by setting TRIBO_TAG (e.g. TRIBO_TAG=v1.2.0); defaults to latest.
# To build locally instead, swap `image:` for `build: .` on the tribo service.
# Radicale is wired but profile-gated off by default (Milestone 6).

services:
  caddy:
    image: docker.io/library/caddy:2
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - tribo

  tribo:
    image: ghcr.io/tibroc/tribo:${TRIBO_TAG:-latest}
    restart: unless-stopped
    environment:
      - DATABASE_PATH=/data/tribo.db
      - LISTEN_ADDR=:8080
      # Auth (OIDC against Authentik). Leave OIDC_ISSUER_URL unset to run with
      # auth disabled (dev mode). When set, also provide a stable SESSION_SECRET.
      # - OIDC_ISSUER_URL=https://authentik.example.com/application/o/tribo/
      # - OIDC_CLIENT_ID=...
      # - OIDC_CLIENT_SECRET=...
      # - OIDC_REDIRECT_URL=https://tribo.example.com/auth/callback
      # - SESSION_SECRET=change-me-to-a-long-random-string
      # CalDAV/Google credentials are encrypted at rest with this key
      # (falls back to SESSION_SECRET if unset):
      # - CREDENTIALS_KEY=change-me-to-a-long-random-string
      # Google Calendar sync (OAuth). Create a Google Cloud OAuth client and set:
      # - GOOGLE_CLIENT_ID=...
      # - GOOGLE_CLIENT_SECRET=...
      # - GOOGLE_REDIRECT_URL=https://tribo.example.com/auth/google/callback
    volumes:
      - tribo_data:/data

  radicale:
    image: docker.io/tomsquest/docker-radicale
    profiles: ["with-radicale"]
    volumes:
      - radicale_data:/data

volumes:
  caddy_data:
  caddy_config:
  tribo_data:
  radicale_data:
