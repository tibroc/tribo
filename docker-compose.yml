# Stack: Caddy (reverse proxy) + Tribo (Go binary with embedded SPA).
# Tribo runs from the prebuilt image published to GHCR by the `docker` workflow.
# Update with `docker compose pull && docker compose up -d`.
# Pin a version by setting TRIBO_TAG (e.g. TRIBO_TAG=v1.2.0); defaults to latest.
# To build locally instead, swap `image:` for `build: .` on the tribo service.
#
# Calendars require a Radicale (CalDAV) backend — it is the system of record for
# all calendars (per-person, family, birthdays, chores). The bundled radicale
# service below is turnkey: it auto-generates its htpasswd from RADICALE_USER/
# RADICALE_PASSWORD (defaults below) and Tribo is wired + gated on it. Change
# RADICALE_PASSWORD for production (radicale is only reachable on the internal
# compose network, never published). To use your own CalDAV server instead,
# drop the radicale service + its depends_on and point RADICALE_URL at it.

services:
  caddy:
    image: docker.io/library/caddy:2
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - tribo

  tribo:
    image: ghcr.io/tibroc/tribo:${TRIBO_TAG:-latest}
    restart: unless-stopped
    environment:
      - DATABASE_PATH=/data/tribo.db
      - LISTEN_ADDR=:8080
      # A fresh instance starts empty and runs the onboarding wizard. Set
      # TRIBO_SEED=true to load the Silva family example data instead.
      # - TRIBO_SEED=true
      # Auth (OIDC against Authentik). Leave OIDC_ISSUER_URL unset to run with
      # auth disabled (dev mode). When set, also provide a stable SESSION_SECRET.
      # - OIDC_ISSUER_URL=https://authentik.example.com/application/o/tribo/
      # - OIDC_CLIENT_ID=...
      # - OIDC_CLIENT_SECRET=...
      # - OIDC_REDIRECT_URL=https://tribo.example.com/auth/callback
      # - SESSION_SECRET=change-me-to-a-long-random-string
      # Group-based member provisioning: on first login Tribo auto-creates a
      # family member with a role derived from the user's OIDC groups (no
      # onboarding wizard). Defaults shown; OIDC_GROUPS_SCOPE is only needed if
      # your IdP requires an extra scope to emit the groups claim (Authentik).
      # - OIDC_GROUPS_CLAIM=groups
      # - OIDC_GUARDIAN_GROUPS=guardian
      # - OIDC_CHILD_GROUPS=children,child
      # - OIDC_GROUPS_SCOPE=groups
      # Radicale calendar backend (required for calendar features). Wired to the
      # bundled radicale service; the URL is the collection home Tribo provisions
      # calendars under. Override RADICALE_PASSWORD via a .env file or shell env.
      - RADICALE_URL=http://radicale:5232/tribo/
      - RADICALE_USER=${RADICALE_USER:-tribo}
      - RADICALE_PASSWORD=${RADICALE_PASSWORD:-tribo-change-me}
      # CalDAV/Google credentials are encrypted at rest with this key
      # (falls back to SESSION_SECRET if unset):
      # - CREDENTIALS_KEY=change-me-to-a-long-random-string
      # Google Calendar sync (OAuth). Create a Google Cloud OAuth client and set:
      # - GOOGLE_CLIENT_ID=...
      # - GOOGLE_CLIENT_SECRET=...
      # - GOOGLE_REDIRECT_URL=https://tribo.example.com/auth/google/callback
    depends_on:
      radicale:
        condition: service_healthy
    volumes:
      - tribo_data:/data

  # CalDAV backend (calendar system of record). Configured entirely via env:
  # htpasswd auth with a bcrypt users file generated at startup from
  # RADICALE_USER/RADICALE_PASSWORD, owner-only rights. Not published to the host.
  radicale:
    image: docker.io/tomsquest/docker-radicale
    restart: unless-stopped
    environment:
      - TAKE_FILE_OWNERSHIP=true
      - RADICALE_USER=${RADICALE_USER:-tribo}
      - RADICALE_PASSWORD=${RADICALE_PASSWORD:-tribo-change-me}
      - RADICALE_CONFIG_SERVER_HOSTS=0.0.0.0:5232
      - RADICALE_CONFIG_AUTH_TYPE=htpasswd
      - RADICALE_CONFIG_AUTH_HTPASSWD_FILENAME=/config/users
      - RADICALE_CONFIG_AUTH_HTPASSWD_ENCRYPTION=bcrypt
      - RADICALE_CONFIG_RIGHTS_TYPE=owner_only
      - RADICALE_CONFIG_STORAGE_FILESYSTEM_FOLDER=/data/collections
    # Generate the bcrypt htpasswd from env, then run radicale as its own user.
    command:
      - sh
      - -ec
      - |
        /venv/bin/python -c '
        import bcrypt, os
        u = os.environ["RADICALE_USER"]; p = os.environ["RADICALE_PASSWORD"]
        open("/config/users", "w").write(u + ":" + bcrypt.hashpw(p.encode(), bcrypt.gensalt()).decode() + "\n")
        '
        exec su-exec radicale /venv/bin/radicale --config /config/config
    healthcheck:
      test: ["CMD", "/venv/bin/python", "-c", "import socket; socket.create_connection(('127.0.0.1', 5232), 2)"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    volumes:
      - radicale_data:/data

volumes:
  caddy_data:
  caddy_config:
  tribo_data:
  radicale_data:
